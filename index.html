<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aerospatial - Subir publicación</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">🚀</div>
        <div>
          <div class="brand-title">AEROESPACIAL</div>
          <div class="brand-subtitle">Discovering the Sky and Space</div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="#">Inicio</a>
        <a href="#">Aviones</a>
        <a href="#">Naves Espaciales</a>
        <a href="#">Galería</a>
        <a class="active" href="#">Subir</a>
        <a href="#">Divulgación</a>
      </nav>
    </header>

    <main class="content">
      <section class="upload-panel">
        <header class="section-header">
          <h1>SUBIR Y COMPARTIR TUS FOTOS DE AVIACIÓN Y ESPACIO</h1>
        </header>

        <div class="card upload-card">
          <div class="upload-grid">
            <div class="upload-zone" id="uploadZone">
              <div class="upload-drop-area" id="dropArea">
                <div class="upload-icon">☁️</div>
                <p>Arrastra y suelta tus fotos o haz clic para subir</p>
              </div>
              <div class="upload-slots" id="slotsContainer">
                <button type="button" class="slot" data-index="0">Subir Foto 1</button>
                <button type="button" class="slot" data-index="1">Subir Foto 2</button>
                <button type="button" class="slot" data-index="2">Subir Foto 3</button>
              </div>
            </div>

            <aside class="info-card">
              <h2>INFORMACIÓN GENERAL Y DIVULGATIVA</h2>

              <label>
                Modelo de Aeronave/Nave:
                <input id="inputModel" type="text" placeholder="Ej. SpaceX Falcon 9" />
              </label>

              <label>
                Tipo:
                <select id="inputType">
                  <option value="Avión Comercial">Avión Comercial</option>
                  <option value="Cohete Espacial">Cohete Espacial</option>
                  <option value="Avión Militar">Avión Militar</option>
                </select>
              </label>

              <label>
                Ubicación/Fecha de la Toma:
                <input id="inputLocation" type="text" placeholder="Ej. Cabo Cañaveral, 12 de julio" />
              </label>

              <label>
                DESCRIPCIÓN DIVULGATIVA (Escribe aquí la historia, datos técnicos y curiosidades):
                <textarea id="inputDescription" placeholder="Comparte información interesante, historia y características sobre la aeronave o nave espacial que has fotografiado..."></textarea>
              </label>

              <label>
                Etiquetas:
                <input id="inputTags" type="text" placeholder="aviación, espacio, NASA" />
              </label>

              <button id="publishButton" class="primary-button">PUBLICAR EN LA COMUNIDAD</button>
            </aside>
          </div>
        </div>

        <div class="latest-section">
          <h2>ÚLTIMAS PUBLICACIONES DIVULGATIVAS</h2>
          <div id="postsGrid" class="posts-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <input id="fileInput" type="file" accept="image/*" multiple hidden />
  <template id="postTemplate">
    <article class="post-card">
      <div class="post-image"></div>
      <div class="post-content">
        <strong class="post-title"></strong>
        <p class="post-text"></p>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
